version: "3.8"

services:
  api:
    build: .
    container_name: sentimentiq-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MODEL_DEVICE=cpu
    volumes:
      - model-cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  model-cache:
    driver: local
